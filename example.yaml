# ── Option B: LVGL ────────────────────────────────────────────────────────────

display:
  - platform: crowpanel_579
    id: my_display
    cs_pin: GPIO45
    dc_pin: GPIO46
    reset_pin: GPIO47
    busy_pin:
      number: GPIO48
      mode:
        input: true
        pulldown: true
    power_pin: GPIO7       # optional — omit if not used
    rotation: 90
    auto_clear_enabled: false

font:
  - file: "gfonts://Roboto"
    id: roboto_24
    size: 24
    bpp: 1

lvgl:
  displays:
    - my_display
  color_depth: 16
  bg_color: 0xFFFFFF
  on_draw_end:
    - lambda: "id(my_display).display();"
  pages:
    - id: main_page
      widgets:
        - label:
            text: "Hello from LVGL"
            align: CENTER
            text_color: 0x000000
