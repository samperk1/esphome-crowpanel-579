substitutions:
  name: crowpanel-579
  friendly_name: "CrowPanel 5.79"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_password

psram:
  mode: octal
  speed: 80MHz

# ── External component: choose one of the two options below ──────────────────
#
# Option 1: Pull directly from GitHub (no download needed)
external_components:
  - source: github://samperk1/esphome-crowpanel-579
    components: [crowpanel_579]
#
# Option 2: Download the repo and reference it locally.
# Copy the components/ folder into your ESPHome config directory, then use:
# external_components:
#   - source:
#       type: local
#       path: components
#     components: [crowpanel_579]

spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11

# ── Option A: Lambda (direct drawing) ────────────────────────────────────────
#
# display:
#   - platform: crowpanel_579
#     id: my_display
#     cs_pin: GPIO45
#     dc_pin: GPIO46
#     reset_pin: GPIO47
#     busy_pin:
#       number: GPIO48
#       mode:
#         input: true
#         pulldown: true
#     power_pin: GPIO7       # optional — omit if not used
#     rotation: 90°
#     update_interval: never
#     lambda: |-
#       it.fill(Color::BLACK);  // Color::BLACK = white paper background
#       it.print(10, 10, id(my_font), Color::WHITE, "Hello World");
#       // Note: Color::WHITE = black ink, Color::BLACK = white paper
#
# font:
#   - file: "gfonts://Roboto"
#     id: my_font
#     size: 24
#     bpp: 1

# ── Option B: LVGL ────────────────────────────────────────────────────────────

display:
  - platform: crowpanel_579
    id: my_display
    cs_pin: GPIO45
    dc_pin: GPIO46
    reset_pin: GPIO47
    busy_pin:
      number: GPIO48
      mode:
        input: true
        pulldown: true
    power_pin: GPIO7       # optional — omit if not used
    rotation: 90
    auto_clear_enabled: false

font:
  - file: "gfonts://Roboto"
    id: roboto_24
    size: 24
    bpp: 1

lvgl:
  displays:
    - my_display
  color_depth: 16
  bg_color: 0xFFFFFF
  on_draw_end:
    - lambda: "id(my_display).display();"
  pages:
    - id: main_page
      widgets:
        - label:
            text: "Hello from LVGL"
            align: CENTER
            text_color: 0x000000

# ── Option C: Partial refresh ─────────────────────────────────────────────────
# Call partial_refresh(x, y, w, h) to update a region without a full refresh.
# Coordinates are physical pixels: x 0–791, y 0–271 (landscape, no rotation).
# Use display() for a full refresh periodically to clear ghosting.
#
# Example — update just a label region after changing its content:
#   id(my_display).partial_refresh(0, 0, 400, 60);
#
# Notes:
#   - Always call display() on first boot to establish a clean baseline.
#   - Partial refresh uses the on-chip OTP waveform (no custom LUT needed).
#   - For faster partial refresh, write 0x6E to register 0x1A before calling:
#       send_command_(0x1A); send_data_(0x6E);  // ~1.5 s
#       send_command_(0x1A); send_data_(0x5A);  // ~1.0 s
