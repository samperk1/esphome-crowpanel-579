substitutions:
  name: crowpanel-579
  friendly_name: "CrowPanel 5.79"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_password

psram:
  mode: octal
  speed: 80MHz

external_components:
  - source:
      type: local
      path: components
    components: [crowpanel_579]

spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11

